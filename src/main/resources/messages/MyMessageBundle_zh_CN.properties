error.unknown=未知错误
error.missingProjectFolder.title=Git Worktree Manager — 项目文件夹已不存在
error.missingProjectFolder.summary=无法运行 Git，因为仓库文件夹缺失或已被移动。
error.missingProjectFolder.action1=从正确的文件夹重新打开项目（File → Open…）
error.missingProjectFolder.action2=从最近的项目中移除过期条目，然后重新打开正确的项目
error.missingProjectFolder.action3=如果文件夹被误删，请先恢复后再重新打开项目
error.lockedWorktree.title=Git Worktree Manager — 工作树已锁定
error.lockedWorktree.summary=此工作树已锁定，插件在解锁前不会删除它。
error.lockedWorktree.action1=在仓库根目录运行：git worktree unlock <worktree-path>
error.lockedWorktree.action2=如果锁定是有意的，请保持锁定状态，不要删除此工作树
error.lockedWorktree.action3=解锁后，刷新列表并重试删除
error.prunableWorktree.title=Git Worktree Manager — 工作树元数据已过期
error.prunableWorktree.summary=此工作树看起来已过期/损坏，应先清理再删除。
error.prunableWorktree.action1=在仓库根目录运行：git worktree prune
error.prunableWorktree.action2=如果之后文件夹仍然存在，请手动删除残留的工作树文件夹
error.prunableWorktree.action3=然后刷新工作树列表，必要时重试分支清理
error.noRepository.title=Git Worktree Manager — 未找到 Git 仓库
error.noRepository.summary=当前项目中未找到 Git 仓库，因此无法管理工作树。
error.noRepository.action1=从包含 .git 目录的文件夹打开项目
error.noRepository.action2=如果这是多模块项目，请确保 IDE 中包含了 Git 根目录
error.noRepository.action3=如果最近刚克隆仓库，请尝试重新打开项目
error.metadataMissing.title=Git Worktree Manager — 工作树元数据缺失
error.metadataMissing.summary=此工作树的元数据似乎已损坏（.git 文件/文件夹缺失），因此 Git 拒绝移除它。
error.metadataMissing.action1=在仓库根目录运行：git worktree prune
error.metadataMissing.action2=如果文件夹仍然存在，请手动删除损坏的工作树文件夹，然后再次清理
error.metadataMissing.action3=然后刷新工作树列表并重试删除
error.gitFailed.title=Git Worktree Manager — Git 命令失败
error.gitFailed.summary=Git 已运行，但在完成操作时返回了错误。
error.gitFailed.action1=在该仓库中打开 Terminal，并运行详细信息中的命令
error.gitFailed.action2=确保您有权访问该文件夹，且仓库未被锁定
error.gitFailed.action3=如果问题持续出现，请在 issue 中分享复制的详细信息
error.unexpected.title=Git Worktree Manager — 意外错误
error.unexpected.summary=尝试完成操作时出现了问题。
error.unexpected.action1=请重试
error.unexpected.action2=如果问题持续出现，请复制详细信息并在 issue 中分享
