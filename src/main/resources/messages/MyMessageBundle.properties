error.unknown=Unknown error
error.missingProjectFolder.title=Git Worktree Manager — Project folder no longer exists
error.missingProjectFolder.summary=Git couldn’t run because the repository folder is missing or was moved.
error.missingProjectFolder.action1=Re-open the project from the correct folder (File → Open…)
error.missingProjectFolder.action2=Remove the stale entry from Recent Projects, then open the real one again
error.missingProjectFolder.action3=If the folder was deleted by mistake, restore it and reopen the project
error.lockedWorktree.title=Git Worktree Manager — Worktree is locked
error.lockedWorktree.summary=This worktree is locked, so the plugin won’t delete it until it is unlocked.
error.lockedWorktree.action1=In the repo root, run: git worktree unlock <worktree-path>
error.lockedWorktree.action2=If the lock is intentional, keep it and do not delete this worktree
error.lockedWorktree.action3=After unlocking, refresh the list and retry deletion
error.prunableWorktree.title=Git Worktree Manager — Worktree metadata is stale
error.prunableWorktree.summary=This worktree looks stale/broken, so it should be pruned before deletion.
error.prunableWorktree.action1=In the repo root, run: git worktree prune
error.prunableWorktree.action2=If the folder still exists afterward, delete the leftover worktree folder manually
error.prunableWorktree.action3=Then refresh the worktree list and retry branch cleanup if needed
error.noRepository.title=Git Worktree Manager — No Git repository found
error.noRepository.summary=No Git repository was found in this project, so worktrees can’t be managed.
error.noRepository.action1=Open the project from a folder that contains a .git directory
error.noRepository.action2=If this is a multi-module project, make sure the Git root is included in the IDE
error.noRepository.action3=If you cloned the repo recently, try reopening the project
error.metadataMissing.title=Git Worktree Manager — Worktree metadata is missing
error.metadataMissing.summary=This worktree’s metadata looks broken (its .git file/folder is missing), so Git refused to remove it.
error.metadataMissing.action1=In the repo root, run: git worktree prune
error.metadataMissing.action2=If the folder still exists, delete the broken worktree folder manually, then prune again
error.metadataMissing.action3=Then refresh the worktree list and retry deletion
error.gitFailed.title=Git Worktree Manager — Git command failed
error.gitFailed.summary=Git ran but returned an error while trying to complete the operation.
error.gitFailed.action1=Open the Terminal in that repo and run the command in Details
error.gitFailed.action2=Make sure you have permission to access the folder and the repo isn’t locked
error.gitFailed.action3=If this keeps happening, share the copied details in an issue
error.unexpected.title=Git Worktree Manager — Unexpected error
error.unexpected.summary=Something went wrong while trying to complete the operation.
error.unexpected.action1=Try again
error.unexpected.action2=If it keeps happening, copy the details and share them in an issue
