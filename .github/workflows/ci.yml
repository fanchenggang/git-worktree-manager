name: CI

on:
  pull_request:
  push:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Verify (tests + plugin structure)
        run: |
          ./gradlew --no-daemon \
            test \
            verifyPluginStructure \
            --stacktrace

      - name: Plugin Verifier
        run: ./gradlew --no-daemon verifyPlugin --stacktrace

      # Package a installable plugin zip (Install Plugin from Disk in the IDE).
      # Runs on every PR and on every push to master after merge.
      - name: Build plugin zip
        run: ./gradlew --no-daemon buildPlugin --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-worktree-manager-${{ github.sha }}
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Resolve release metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q properties | sed -n 's/^version: //p' | head -n 1)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ZIP_PATH=$(ls -1 build/distributions/*.zip | head -n 1)
          ZIP_NAME=$(basename "$ZIP_PATH")
          {
            echo "version=$VERSION"
            echo "short_sha=$SHORT_SHA"
            echo "zip_path=$ZIP_PATH"
            echo "zip_name=$ZIP_NAME"
          } >> "$GITHUB_OUTPUT"
          echo "Version=$VERSION SHA=$SHORT_SHA Zip=$ZIP_NAME"

      # Per-merge release so each master merge has a downloadable install zip on the Releases page.
      - name: Create GitHub Release for this build
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.meta.outputs.short_sha }}
          name: ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.short_sha }})
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: ${{ steps.meta.outputs.zip_path }}
          fail_on_unmatched_files: true
          body: |
            Installable plugin build from `master` after merge.

            - **Version:** `${{ steps.meta.outputs.version }}`
            - **Commit:** ${{ github.sha }}
            - **File:** `${{ steps.meta.outputs.zip_name }}`

            Install in the IDE: **Settings → Plugins → ⚙️ → Install Plugin from Disk…**

            This zip is unsigned (fine for local install). JetBrains Marketplace publishes still use `v*` tags.

      # Stable download URL that always points at the newest master build.
      - name: Update rolling master-latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-latest
          name: Latest master build (${{ steps.meta.outputs.version }})
          prerelease: true
          make_latest: false
          files: ${{ steps.meta.outputs.zip_path }}
          fail_on_unmatched_files: true
          body: |
            Rolling installable build from `master` (updated on every merge).

            - **Version:** `${{ steps.meta.outputs.version }}`
            - **Commit:** ${{ github.sha }}
            - **Per-build release:** `build-${{ steps.meta.outputs.short_sha }}`

            Install in the IDE: **Settings → Plugins → ⚙️ → Install Plugin from Disk…**
