name: CI

on:
  pull_request:
  push:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Verify (tests + plugin structure)
        run: |
          ./gradlew --no-daemon \
            test \
            verifyPluginStructure \
            --stacktrace

      - name: Plugin Verifier
        run: ./gradlew --no-daemon verifyPlugin --stacktrace

      # Package a installable plugin zip (Install Plugin from Disk in the IDE).
      # Runs on every PR and on every push to master after merge.
      - name: Build plugin zip
        run: ./gradlew --no-daemon buildPlugin --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-worktree-manager-${{ github.sha }}
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30
